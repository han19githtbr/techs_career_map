<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mapa Técnico Interativo — Full Stack Developer Knowledge Map" />
  <title>Tech Map — Mapa Técnico Interativo</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00d4ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tech Map" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- =====================================================
       HEADER
       ===================================================== -->
  <header id="app-header">
    <div class="header-badge">
      <span></span> Full Stack Developer Knowledge Map
    </div>
    <h1 id="app-title">Mapa Técnico Interativo</h1>
    <p id="app-subtitle">Centralize e visualize todo o seu conhecimento técnico</p>
  </header>

  <!-- =====================================================
       BARRA DE CONTROLES: Idioma + Busca + Filtros
       ===================================================== -->
  <div id="controls">
    <!-- Seletor de idioma -->
    <div id="lang-switcher" aria-label="Idioma / Language / Langue">
      <button class="lang-btn active" data-lang="pt">PT</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>

    <!-- Campo de busca -->
    <div id="search-wrapper">
      <span id="search-icon">🔍</span>
      <input
        type="search"
        id="search-input"
        placeholder="Buscar tecnologia..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Chips de filtro por categoria (gerados pelo JS) -->
    <div id="filter-bar" role="group" aria-label="Filtros de categoria"></div>
  </div>

  <!-- =====================================================
       BARRA DE ESTATÍSTICAS
       ===================================================== -->
  <div id="stats-bar">
    <span>
      Tecnologias: <span class="stat-count" id="stats-count">—</span>
    </span>
  </div>

  <!-- =====================================================
       GRID DE CARDS (gerado pelo JS)
       ===================================================== -->
  <main>
    <div id="tech-grid" role="list" aria-label="Lista de tecnologias"></div>

    <!-- Empty state -->
    <div id="empty-state" role="status" aria-live="polite">
      <div class="empty-icon">🔭</div>
      <p>Nenhuma tecnologia encontrada.</p>
    </div>
  </main>

  <!-- =====================================================
       MODAL OVERLAY + PAINEL (conteúdo gerado pelo JS)
       ===================================================== -->
  <div
    id="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
    <div id="modal-panel"></div>
  </div>

  <!-- =====================================================
       FOOTER
       ===================================================== -->
  <footer id="app-footer">
    Built with <span>♥</span> — Full Stack Developer Tech Map &mdash; PT · EN · FR
  </footer>


  <!-- PWA Install Banner -->
  <div id="pwa-banner" role="complementary" aria-label="Instalar aplicativo">
    <div id="pwa-banner-text">
      <strong>📲 Instalar Tech Map</strong>
      Acesse offline como um app
    </div>
    <button id="pwa-install-btn">Instalar</button>
    <button id="pwa-dismiss-btn" aria-label="Fechar">✕</button>
  </div>

  <!-- Script principal -->
  <script src="js/index.js"></script>
</body>
</html>
